apiVersion: apps/v1
kind: Deployment
metadata:
  name: dpanel-api
  namespace: dclaw-core
  labels:
    app.kubernetes.io/name: dpanel-api
    app.kubernetes.io/part-of: dclaw-platform
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dpanel-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dpanel-api
        app.kubernetes.io/part-of: dclaw-platform
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: dpanel-api
      containers:
        - name: dpanel-api
          image: ghcr.io/dclawstack/dpanel-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8088
              protocol: TCP
          env:
            - name: PORT
              value: "8088"
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /api/v1/apps
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/apps
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
