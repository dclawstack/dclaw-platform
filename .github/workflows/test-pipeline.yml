name: TEST-01 Pipeline Validation

on:
  push:
    branches: [main]
    paths:
      - 'TEST-01/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Telegram Notification
        run: |
          echo "Bot token length: ${#TELEGRAM_BOT_TOKEN}"
          echo "Channel ID: $TELEGRAM_META_CHANNEL"
          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_META_CHANNEL}" \
            -d "text=TEST-01 PASSED%0A%0ACommit: ${{ github.sha }}%0ARepo: ${{ github.repository }}%0AAuthor: ${{ github.actor }}%0A%0APipeline is LIVE." \
            -d "parse_mode=HTML")
          echo "$RESPONSE"
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Telegram API failed with HTTP $HTTP_CODE"
            exit 1
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_META_CHANNEL: ${{ secrets.TELEGRAM_META_CHANNEL }}
      
      - name: Echo Success
        run: echo "TEST-01 Pipeline validation complete"
